# scenarios/ouch_bolum3_piyasa_yapicilik.yaml
#
# OUCH Sertifikasyon Programı — Bölüm 3: Piyasa Yapıcılık (MassQuote).
# Source: Pay Piyasası OUCH Sertifikasyon Programı v1.7.

name: ouch_bolum3_piyasa_yapicilik
description: |
  ALCAR.E açılış kotasyon, P_SaltKotasyon güncelleme/iptal,
  DJIST.F tek taraf iptal, MassQuote 4 enstrüman tek mesaj
  (Mass Quote Acknowledgement - Some Quotes Rejected).
preconditions:
  protocol: ouch
  market: pay_piyasasi

steps:
  - id: 1
    action: ouch_login
    expect: login_accepted

  # ----- ALCAR.E açılış emirleri -----
  - id: 2
    action: place
    args: { symbol: ALCAR.E, side: BUY,  qty: 100, price: 4.950, token: 220 }
    expect: order_accepted

  - id: 3
    action: place
    args: { symbol: ALCAR.E, side: SELL, qty: 700, price: 5.100, token: 230 }
    expect: order_accepted

  # ----- ALCAR.E kotasyon: 5.100 - 5.110, 500 lot her tarafta -----
  - id: 4
    action: mass_quote
    args:
      token: 500
      category: CLIENT
      afk: PYM
      entries:
        - { symbol: ALCAR.E, bid_px: 5.100, bid_size: 500,
                              offer_px: 5.110, offer_size: 500 }
    expect:
      msg: mass_quote_ack
      occurrences: 2          # bid + offer
      fields: { quote_status: 0 }    # Accept

  # ----- yasak safhada kotasyon → BIST rejects (mock has no session-phase
  # ----- model in phase 1, so this just confirms the wire roundtrip) -----
  - id: 5
    action: mass_quote
    args:
      token: 510
      entries:
        - { symbol: ALCAR.E, bid_px: 5.200, bid_size: 500,
                              offer_px: 5.250, offer_size: 500 }
    expect:
      msg: any
      occurrences: 2

  # ----- ASELS.E P_SaltKotasyon: yeni kotasyon → güncelle → iptal -----
  - id: 6
    action: mass_quote
    args:
      token: 520
      entries:
        - { symbol: ASELS.E, bid_px: 5.080, bid_size: 500,
                              offer_px: 5.090, offer_size: 500 }
    expect:
      msg: mass_quote_ack
      occurrences: 2

  - id: 7
    action: mass_quote
    args:
      token: 530
      entries:
        - { symbol: ASELS.E, bid_px: 5.070, bid_size: 500,
                              offer_px: 5.080, offer_size: 500 }
    expect:
      msg: mass_quote_ack
      occurrences: 2
      fields: { quote_status: 1 }    # Updated

  - id: 8
    action: mass_quote
    args:
      token: 540
      entries:
        - { symbol: ASELS.E, bid_px: 0, bid_size: 0, offer_px: 0, offer_size: 0 }
    expect:
      msg: mass_quote_ack
      occurrences: 2
      fields: { quote_status: 2 }    # Canceled

  # ----- DJIST.F tek taraf iptal -----
  - id: 9
    action: mass_quote
    args:
      token: 550
      entries:
        - { symbol: DJIST.F, bid_px: 5.000, bid_size: 500,
                              offer_px: 5.250, offer_size: 500 }
    expect:
      msg: mass_quote_ack
      occurrences: 2

  - id: 10
    action: mass_quote
    args:
      token: 560
      entries:
        # bid only cancel: bid=0/0, offer kept (>0)
        - { symbol: DJIST.F, bid_px: 0, bid_size: 0,
                              offer_px: 5.250, offer_size: 500 }
    expect:
      msg: mass_quote_ack
      occurrences: 2

  - id: 11
    action: mass_quote
    args:
      token: 570
      entries:
        # offer side cancel
        - { symbol: DJIST.F, bid_px: 0, bid_size: 0,
                              offer_px: 0, offer_size: 0 }
    expect:
      msg: mass_quote_ack
      occurrences: 2

  # ----- 4 enstrüman tek MassQuote, 4. ZOREN.E reject (bid > offer) -----
  # Wire response: 6 Mass Quote Ack (bid+offer for entries 1..3) + 1 Mass
  # Quote Rejection (entry 4 crossed). The runner currently asserts on the
  # event count rather than the per-entry decomposition; richer field-level
  # matching arrives in phase 2.
  - id: 12
    action: mass_quote
    args:
      token: 580
      entries:
        - { symbol: ACSEL.E,  bid_px: 6.300, bid_size: 500,
                               offer_px: 6.550, offer_size: 500 }
        - { symbol: HATEK.E,  bid_px: 5.300, bid_size: 500,
                               offer_px: 5.450, offer_size: 500 }
        - { symbol: MGROS.E,  bid_px: 5.000, bid_size: 500,
                               offer_px: 5.200, offer_size: 1000 }
        - { symbol: ZOREN.E,  bid_px: 5.000, bid_size: 500,
                               offer_px: 4.800, offer_size: 1000 }   # crossed
    expect:
      msg: any
      occurrences: 7      # 3 accepted entries × 2 sides + 1 rejection
