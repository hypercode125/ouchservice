# config/bist_t_plus_1.toml
#
# BIST T+1 üye test ortamı (anchor IP 10.57.3.208).
# Source: Üye Test Ortamları Bilgilendirme Dokümanı, 24.03.2026.
#   - T+1 takas projesi (sermaye piyasası araçları + dayanak türevler)
#   - Hafta sonu AÇIK
#   - Kullanıcı sınıfları: Üye + HFT + VYK + ISV
#   - Bu proje T+0 mevcut yapıyı değiştirmez; ayrı sandbox
#
# Self-service: https://connect-uat.borsaistanbul.com/
# Real credentials → config/bist_t_plus_1.local.toml (gitignored)

[environment]
name        = "t_plus_1"
description = "BIST T+1 üye test ortamı (T+1 takas projesi sandbox)"
weekend     = true

[ouch]
# OUCH IP doc Tablo 1.3'ten (anchor 10.57.3.208 → OUCH satırı):
#   COLO  : 194.0.142.92
#   UEA   : 10.57.3.206
host_primary    = "194.0.142.92"
host_secondary  = "194.0.142.92"
ports           = []
heartbeat_ms    = 800
username        = ""
password        = ""
session         = ""
sequence        = 0
cod_reconnect_deadline_ms = 30000

[ouch.uea]
host  = "10.57.3.206"
ports = []

[fix]
host_primary    = "10.57.3.207"
host_colo       = "194.0.142.93"
oe_port         = 0
rd_port         = 0
dc_port         = 0
sender_comp_id  = ""
target_comp_id  = ""
data_dictionary = "include/bist/fix/data_dict/BIST_FIX50SP2.xml"
heartbeat_secs  = 30
session_storage = "state/fix-tplus1"

[fix.dc]
host_primary    = "10.57.3.210"
host_colo       = "194.0.142.188"

[fix.password]
current = ""
next    = ""

[itch]
# Phase 3 referans — Pay Piyasası T+1 ITCH endpoints
itchmold_multicast = "233.113.240.71"
itchmold_ports     = [21001, 21002, 21003, 21004]
itchsoup_uea_host  = "10.57.3.206"
itchsoup_uea_ports = [21501, 21502, 21503, 21504]
itchsoup_colo_host = "194.0.142.92"
itchsoup_colo_ports= [21501, 21502, 21503, 21504]
itchrw_host        = "194.0.142.92"
itchrw_ports       = [24001, 24002, 24003, 24004]
glimpse_uea_host   = "10.57.3.206"
glimpse_uea_ports  = [21802, 21804, 21806, 21808]
glimpse_colo_host  = "194.0.142.92"
glimpse_colo_ports = [21801, 21803, 21805, 21807]

[ptrm]
gui_uea = "http://10.57.3.206:8081/grx/"
api     = ""

[throttler]
orders_per_sec = 100

[risk]
max_qty_per_order      = 10_000_000
max_open_orders        = 50_000
allowed_price_min_tl   = 0.001
allowed_price_max_tl   = 1_000_000

[runner]
default_timeout_ms = 5_000
abort_on_failure   = false

[logging]
level     = "debug"
directory = "log/tplus1"
audit_dir = "audit/tplus1"
rotate_at_size_mb = 256
keep_files        = 30

[reactor]
hot_cpu_pin       = -1
busy_poll         = false
tcp_nodelay       = true
recv_buf_bytes    = 1_048_576
send_buf_bytes    = 1_048_576
