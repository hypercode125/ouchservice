# config/bist_preprod.toml
#
# BIST Pre-Prod üye test ortamı (anchor IP 10.57.3.57).
# Source: Üye Test Ortamları Bilgilendirme Dokümanı, 24.03.2026.
#   - Yeni sürüm planı varsa ilk burada teste açılır
#   - Hafta sonu AÇIK — geliştirme/iterasyon için ideal
#   - Kullanıcı sınıfları: Üye + HFT + VYK + ISV
#
# ISV taze test hesabı: bistechsupport_autoticket@borsaistanbul.com → talep
# Üye self-service: https://connectint3.borsaistanbul.com/
#
# Real credentials → config/bist_preprod.local.toml (gitignored)

[environment]
name        = "pre_prod"
description = "BIST Pre-Prod üye test ortamı (yeni sürüm sandbox, hafta sonu açık)"
weekend     = true

[ouch]
# OUCH IP doc Tablo 1.3'ten (anchor 10.57.3.57 → OUCH satırı):
#   COLO  : 194.0.142.71
#   UEA   : 10.57.3.61
host_primary    = "194.0.142.71"
host_secondary  = "194.0.142.71"
ports           = []                          # populated from .local.toml
heartbeat_ms    = 800
username        = ""
password        = ""
session         = ""
sequence        = 0
cod_reconnect_deadline_ms = 30000

[ouch.uea]
host  = "10.57.3.61"
ports = []

[fix]
host_primary    = "10.57.3.62"                # FIX OE/RD UEA
host_colo       = "194.0.142.72"              # FIX OE/RD COLO
oe_port         = 0
rd_port         = 0
dc_port         = 0
sender_comp_id  = ""
target_comp_id  = ""
data_dictionary = "include/bist/fix/data_dict/BIST_FIX50SP2.xml"
heartbeat_secs  = 30
session_storage = "state/fix-preprod"

[fix.dc]
host_primary    = "10.57.3.63"                # FIX Drop Copy UEA
host_colo       = "194.0.142.74"

[fix.password]
current = ""
next    = ""

[itch]
# Phase 3 referans — Pay Piyasası Pre-Prod ITCH endpoints
itchmold_multicast = "233.113.216.65"
itchmold_ports     = [21001, 21002, 21003, 21004]
itchsoup_uea_host  = "10.57.3.61"
itchsoup_uea_ports = [21501, 21502, 21503, 21504]
itchsoup_colo_host = "194.0.142.71"
itchsoup_colo_ports= [21501, 21502, 21503, 21504]
itchrw_host        = "194.0.142.71"
itchrw_ports       = [24001, 24002, 24003, 24004]
glimpse_uea_host   = "10.57.3.61"
glimpse_uea_ports  = [21802, 21804, 21806, 21808]
glimpse_colo_host  = "194.0.142.71"
glimpse_colo_ports = [21801, 21803, 21805, 21807]

[ptrm]
gui_uea = "http://10.57.3.61:8082/grx/"
api     = ""

[throttler]
orders_per_sec = 100

[risk]
max_qty_per_order      = 10_000_000
max_open_orders        = 50_000
allowed_price_min_tl   = 0.001
allowed_price_max_tl   = 1_000_000

[runner]
default_timeout_ms = 5_000
abort_on_failure   = false                    # iterasyon ortamı, hata fırlatma

[logging]
level     = "debug"                           # daha verbose Pre-Prod'da
directory = "log/preprod"
audit_dir = "audit/preprod"
rotate_at_size_mb = 256
keep_files        = 30

[reactor]
hot_cpu_pin       = -1
busy_poll         = false
tcp_nodelay       = true
recv_buf_bytes    = 1_048_576
send_buf_bytes    = 1_048_576
